services:
  postgres:
    image: postgres:18.4-alpine
    container_name: talyra
    restart: unless-stopped
    environment:
      POSTGRES_USER: talyra
      POSTGRES_PASSWORD: talyra
      POSTGRES_DB: talyra
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - talyra-postgres-18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talyra -d talyra"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  talyra-postgres-18-data:

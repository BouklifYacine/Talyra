services:
  postgres:
    image: postgres:18.4-alpine
    container_name: naryo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: naryo
      POSTGRES_PASSWORD: naryo
      POSTGRES_DB: naryo
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - naryo-postgres-18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naryo -d naryo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  naryo-postgres-18-data:
